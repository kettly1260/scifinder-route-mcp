integrations:
  zotero_linking_enabled: false
  zotero_linking_on_import: true
  zotero_extraction_strategy: rules_first
  zotero_llm_priority_terms:
    - scale
    - purification
    - SI
  # Default project connection: one local Streamable HTTP MCP endpoint.
  # If Zotero MCP runs on the same host, this is the only endpoint users need.
  zotero_mcp_endpoints:
    - id: local-zotero
      alias: local-zotero
      group_name: local-zotero
      url: http://127.0.0.1:23120/mcp
      enabled: true
      priority: 100
      timeout_seconds: 10
      write_note_enabled: false
      headers: {}
